<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessForge - Home</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/home.css">
</head>

<body>
    <div class="user-profile">
        <span id="welcome-message"></span>
        <button id="logout-btn" type="button">🚪 Logout</button>
    </div>

    <div class="home-card">
        <h1>♟️ ChessForge</h1>
        <p class="subtitle">Play, learn, and improve your chess game</p>

        <button class="play-btn" onclick="window.location.href='game.html'">
            ▶ Play Now
        </button>

        <div class="features">
            <div class="feature-item">
                <span>🤖</span>
                Play vs Bot
            </div>
            <div class="feature-item">
                <span>📜</span>
                Move History
            </div>
            <div class="feature-item">
                <span>🔊</span>
                Sound FX
            </div>
            <div class="feature-item">
                <span>🎨</span>
                Custom Pieces
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        const userName = localStorage.getItem("userName") || "Player";
        const welcomeSpan = document.getElementById("welcome-message");
        if (welcomeSpan) welcomeSpan.textContent = `Welcome, ${userName}!`;

        const logoutBtn = document.getElementById("logout-btn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", () => {
                localStorage.removeItem("token");
                localStorage.removeItem("userName");
                window.location.href = "login.html";
            });
        }
    </script>
</body>
</html>
